<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>Gusano barrenador - Próximamente</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(720px, 96vw);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 22px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 10px 0 18px;
        color: #334155;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        text-decoration: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        border: 1px solid #0f172a;
        background: #0f172a;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Mapa de casos de gusano barrenador</h1>
        <p>
          Esta sección está en desarrollo. Aquí se publicará el mapa interactivo de casos de
          gusano barrenador.
        </p>
        <a href="/">Volver al inicio</a>
      </section>
    </main>
  </body>
  </html>
